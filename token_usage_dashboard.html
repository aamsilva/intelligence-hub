<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Usage Dashboard - 2026-04-06</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --border: #30363d;
            --accent: #58a6ff;
            --success: #238636;
            --danger: #da3633;
            --warning: #d29922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-primary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .label { color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: var(--accent); }
        .stat-card .sub { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
        .chart-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-wrapper { position: relative; height: 400px; }
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: var(--text-secondary); font-weight: 600; }
        tr:hover { background: rgba(88, 166, 255, 0.1); }
        .progress {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
        }
        .model-badge {
            display: inline-block;
            padding: 2px 8px;
            background: var(--border);
            border-radius: 4px;
            font-size: 12px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Token Usage Dashboard - 2026-04-06</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Total Tokens</div>
                <div class="value">111,606,810</div>
            </div>
            <div class="stat-card">
                <div class="label">Input Tokens</div>
                <div class="value">109,888,606</div>
            </div>
            <div class="stat-card">
                <div class="label">Output Tokens</div>
                <div class="value">1,718,204</div>
            </div>
            <div class="stat-card">
                <div class="label">API Calls</div>
                <div class="value">3,859</div>
            </div>
            <div class="stat-card">
                <div class="label">Tool Calls</div>
                <div class="value">3,565</div>
            </div>
            <div class="stat-card">
                <div class="label">Cache Read</div>
                <div class="value">127,144,284</div>
            </div>
            <div class="stat-card">
                <div class="label">Reasoning</div>
                <div class="value">0</div>
            </div>
            <div class="stat-card">
                <div class="label">Cost (USD)</div>
                <div class="value">$0.00</div>
            </div>
        </div>
    </div>
</body>
</html>
