<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Fallback & Error Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --red: #f85149;
            --yellow: #d29922;
            --green: #3fb950;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { margin: 0; color: var(--accent); }
        .timestamp { color: #8b949e; font-size: 14px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }
        .card h3 { margin: 0 0 15px 0; color: #8b949e; font-size: 14px; text-transform: uppercase; }
        .big-number { font-size: 36px; font-weight: bold; }
        .red { color: var(--red); }
        .yellow { color: var(--yellow); }
        .green { color: var(--green); }
        
        .chart-container { position: relative; height: 300px; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: #8b949e; font-size: 12px; text-transform: uppercase; }
        .error-row td:first-child { color: var(--red); }
        .fallback-row td:first-child { color: var(--yellow); }
        
        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-ok { background: #238636; color: white; }
        .status-warn { background: #9e6a03; color: white; }
        .status-err { background: #da3633; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔄 Hermes Fallback & Error Dashboard</h1>
        <span class="timestamp" id="timestamp">Loading...</span>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Total Errors</h3>
            <div class="big-number red" id="total-errors">-</div>
        </div>
        <div class="card">
            <h3>Total Fallbacks</h3>
            <div class="big-number yellow" id="total-fallbacks">-</div>
        </div>
        <div class="card">
            <h3>429 Rate Limits</h3>
            <div class="big-number red" id="rate-limits">-</div>
        </div>
        <div class="card">
            <h3>404 Not Found</h3>
            <div class="big-number" id="not-found">-</div>
        </div>
    </div>
    
    <div class="grid">
        <div class="card">
            <h3>Error Breakdown</h3>
            <div class="chart-container">
                <canvas id="errorChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h3>Provider Fallback Events</h3>
            <div class="chart-container">
                <canvas id="fallbackChart"></canvas>
            </div>
        </div>
    </div>
    
    <div class="card">
        <h3>Error Details</h3>
        <table>
            <thead>
                <tr>
                    <th>Error Type</th>
                    <th>Count</th>
                    <th>% of Total</th>
                </tr>
            </thead>
            <tbody id="error-table">
            </tbody>
        </table>
    </div>
    
    <div class="card" style="margin-top: 20px;">
        <h3>Recent Fallback Events</h3>
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Event</th>
                </tr>
            </thead>
            <tbody id="fallback-table">
            </tbody>
        </table>
    </div>

    <script>
        // Fetch data
        fetch('fallback_dashboard.json')
            .then(r => r.json())
            .then(data => {
                document.getElementById('timestamp').textContent = new Date().toLocaleString();
                
                // Top numbers
                document.getElementById('total-errors').textContent = data.total_errors.toLocaleString();
                document.getElementById('total-fallbacks').textContent = data.total_fallbacks.toLocaleString();
                document.getElementById('rate-limits').textContent = (data.hermes_errors['429_Rate_Limit'] || 0).toLocaleString();
                document.getElementById('not-found').textContent = (data.hermes_errors['404_Not_Found'] || 0).toLocaleString();
                
                // Error table
                const errorTable = document.getElementById('error-table');
                const errors = Object.entries(data.hermes_errors).sort((a,b) => b[1] - a[1]);
                const total = data.total_errors || 1;
                errors.forEach(([type, count]) => {
                    const pct = ((count / total) * 100).toFixed(1);
                    errorTable.innerHTML += `
                        <tr class="error-row">
                            <td>${type.replace(/_/g, ' ')}</td>
                            <td>${count.toLocaleString()}</td>
                            <td>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${pct}%"></div>
                                </div>
                                ${pct}%
                            </td>
                        </tr>
                    `;
                });
                
                // Fallback table
                const fbTable = document.getElementById('fallback-table');
                data.recent_fallbacks.slice(-10).reverse().forEach(ts => {
                    fbTable.innerHTML += `
                        <tr class="fallback-row">
                            <td>${ts}</td>
                            <td><span class="status-badge status-warn">Rate Limit → Fallback</span></td>
                        </tr>
                    `;
                });
                
                // Error chart
                new Chart(document.getElementById('errorChart'), {
                    type: 'doughnut',
                    data: {
                        labels: errors.map(e => e[0].replace(/_/g, ' ')),
                        datasets: [{
                            data: errors.map(e => e[1]),
                            backgroundColor: ['#f85149', '#d29922', '#8b949e', '#58a6ff', '#3fb950']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'right', labels: { color: '#c9d1d9' } } }
                    }
                });
                
                // Fallback chart
                new Chart(document.getElementById('fallbackChart'), {
                    type: 'bar',
                    data: {
                        labels: ['Total Fallbacks'],
                        datasets: [{
                            label: 'Fallback Events',
                            data: [data.total_fallbacks],
                            backgroundColor: '#d29922'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } },
                            x: { ticks: { color: '#8b949e' }, grid: { display: false } }
                        }
                    }
                });
            });
    </script>
</body>
</html>
